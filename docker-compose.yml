version: '3.8'

services:
  # 1. Database Storage Service
  db:
    image: postgres:15-alpine
    container_name: flipkart_tracker_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_pass
      POSTGRES_DB: flipkart_tracker
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flipkart_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Express API & Scraper Service (Playwright)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flipkart_tracker_api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres_secure_pass@db:5432/flipkart_tracker?schema=public
      - SCRAPER_CRON_SCHEDULE=0 3 * * * # Automatically runs daily at 3:00 AM
      # Add your custom alerting credentials here:
      - DISCORD_WEBHOOK_URL=
      - TELEGRAM_BOT_TOKEN=
      - TELEGRAM_CHAT_ID=
      - SMTP_HOST=
      - SMTP_PORT=587
      - SMTP_USER=
      - SMTP_PASS=
      - NOTIFICATION_FROM_EMAIL=
    depends_on:
      db:
        condition: service_healthy

  # 3. Static Nginx Web Server Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:5000/api # Set to your VPS IP or public domain if deploying online
    container_name: flipkart_tracker_client
    restart: always
    ports:
      - "8080:80" # Maps port 8080 of the host to port 80 of the container
    depends_on:
      - backend

volumes:
  pgdata:
